<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#4b5563" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#4b5563" stroke-width="2"/>
  <!-- Teardrop shape -->
  <path d="M32,50.5
    C18.5,43.5 18.5,28 32,20.5
    C45.5,28 45.5,43.5 32,50.5Z"
    fill="rgba(255,255,255,0.95)" filter="url(#ds)"/>
  <!-- Downward arc (sad mouth hint) -->
  <path d="M26,39.5 Q32,45 38,39.5"
        fill="none" stroke="#6b7280" stroke-width="2.2" stroke-linecap="round"/>
</svg>
