<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffa855"/>
      <stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#ea580c" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ea580c" stroke-width="2"/>
  <!-- Warning triangle (rounded corners) -->
  <polygon points="32,12 54,50 10,50" fill="rgba(255,255,255,0.95)" filter="url(#ds)"/>
  <!-- Exclamation body -->
  <rect x="29.9" y="24" width="4" height="13" rx="1.5" fill="#f97316"/>
  <!-- Exclamation dot -->
  <circle cx="32" cy="42.5" r="2.2" fill="#f97316"/>
</svg>
